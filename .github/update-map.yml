name: Update Election Map

on:
  schedule:
    - cron: "0 */12 * * *"   # every 10 minutes
  workflow_dispatch:         # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("sf","dplyr","leaflet","htmlwidgets","htmltools","readr"))'

      - name: Run script
        run: Rscript scripts/mapscript.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html index_files/ || true
          git commit -m "Auto update map" || echo "No changes"
          git push
